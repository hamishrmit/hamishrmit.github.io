<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenebrae Kinesis</title>
    <!-- chose the name 'Tenebrae Kinesis' for the video art because Tenebrae means darkness/shadows and Kinesis means random movement, so it seemed like a fitting and cool name -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Orbitron:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <!-- google fonts selected to match the dark futuristic and atmospheric vibe of artwork. Orbitron gives the heading a sci-fi kinda feeling, while Inter keeps the interface readable and modern -->
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="page-layout">
      <header class="hero">
        <!-- made layout intentionally minimal so the artwork itself becomes the primary visual focus -->
        <p class="sub-heading">ATMOSPHERIC • HYPNOTIC • ETHEREAL</p>
        <!-- added three adjectives underneath title to describe/make statements about the artwork -->
        <h1>Tenebrae Kinesis</h1>
      </header>
      <div class="container">
        <section class="player-glow" id="player-glow">
          <!-- glow wrapper to increase lighting intensity when users interact with the like button -->
          <section class="media-player">
            <div class="video-wrapper">
              <!-- added class and id tags for the media player and wrapper -->
              <video id="custom-video-player">
                <source
                  src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/miac.mp4"
                  type="video/mp4"
                />
              </video>
            </div>
            <div class="custom-controls">
              <div class="controls-left">
                <!-- button controls separated into left/middle/right groups for balance -->
                <button id="rewind-btn">
                  <img
                    src="https://img.icons8.com/ios-glyphs/30/rewind.png"
                    alt="Rewind"
                  />
                </button>
                <button id="play-pause-btn">
                  <img
                    id="play-pause-img"
                    src="https://img.icons8.com/ios-glyphs/30/play--v2.png"
                    alt="Play"
                  />
                </button>
                <button id="forward-btn">
                  <img
                    src="https://img.icons8.com/ios-glyphs/30/fast-forward.png"
                    alt="Forward"
                  />
                </button>
              </div>
              <div class="controls-middle">
                <!-- positioned like button in middle to make it feel like the main interaction feature -->
                <button id="like-btn">
                  <img
                    src="https://img.icons8.com/?size=100&id=DFU1kReSUccu&format=png&color=FFFFFF"
                    alt="Like"
                  />
                </button>
                <span id="like-count">0</span>
              </div>
              <!-- made it so users can repeatedly “like” the artwork, increasing the surrounding glow intensity, and also counting likes for visible feedback -->
              <div class="controls-right">
                <button id="mute-btn">
                  <img
                    id="mute-img"
                    src="https://img.icons8.com/ios-glyphs/30/high-volume--v2.png"
                    alt="Volume"
                  />
                </button>
                <button id="fullscreen-btn">
                  <img
                    src="https://img.icons8.com/ios-glyphs/30/full-screen--v1.png"
                    alt="Fullscreen"
                  />
                </button>
              </div>
            </div>
            <div class="progress-container" id="progress-container">
              <span id="progress-bar-fill"></span>
            </div>
            <!-- added interactive progress bar so users can skip to specific times throughout video -->
            <div class="time-display">
              <span id="current-time">0:00</span>
              <span id="duration">0:00</span>
            </div>
            <!-- added time display to show video progress -->
          </section>
        </section>
      </div>
    </main>
  </body>
</html>
